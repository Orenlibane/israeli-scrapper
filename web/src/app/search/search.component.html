<div class="panel">
  <h2>Search Filters</h2>

  <div class="grid">
    <div class="field">
      <label>City</label>
      <select [(ngModel)]="params.cityId" (change)="onCityChange()">
        <option [value]="0" disabled>Select city...</option>
        @for (c of cities; track c.id) {
          <option [value]="c.id">{{ c.nameHe }} ({{ c.name }})</option>
        }
      </select>
    </div>

    <div class="field">
      <label>Neighborhood</label>
      <select [(ngModel)]="params.neighborhoodId" [disabled]="!neighborhoods.length">
        <option [value]="undefined">All neighborhoods</option>
        @for (n of neighborhoods; track n.id) {
          <option [value]="n.id">{{ n.nameHe }} ({{ n.name }})</option>
        }
      </select>
    </div>

    <div class="field">
      <label>Deal Type</label>
      <select [(ngModel)]="params.dealType">
        <option value="sale">For Sale</option>
        <option value="rent">For Rent</option>
      </select>
    </div>

    <div class="field">
      <label>Min Price (₪)</label>
      <input type="number" [(ngModel)]="params.minPrice" placeholder="e.g. 2000000" />
    </div>

    <div class="field">
      <label>Max Price (₪)</label>
      <input type="number" [(ngModel)]="params.maxPrice" placeholder="e.g. 5000000" />
    </div>

    <div class="field">
      <label>Min sqm</label>
      <input type="number" [(ngModel)]="params.minSqm" placeholder="e.g. 60" />
    </div>

    <div class="field">
      <label>Max sqm</label>
      <input type="number" [(ngModel)]="params.maxSqm" placeholder="e.g. 120" />
    </div>

    <div class="field">
      <label>Min Rooms</label>
      <input type="number" step="0.5" [(ngModel)]="params.minRooms" placeholder="e.g. 3" />
    </div>

    <div class="field">
      <label>Max Rooms</label>
      <input type="number" step="0.5" [(ngModel)]="params.maxRooms" placeholder="e.g. 5" />
    </div>
  </div>

  <div class="actions">
    <button class="btn-primary" (click)="scan()" [disabled]="scanning || !params.cityId">
      {{ scanning ? 'Scanning...' : '🔍 Scan Yad2 Now' }}
    </button>
    <button class="btn-secondary" (click)="loadListings()" [disabled]="!params.cityId">
      📋 Show Saved Results
    </button>
    @if (scanStatus) {
      <span class="status" [class.error]="scanStatus.startsWith('Failed')">{{ scanStatus }}</span>
    }
  </div>
</div>

@if (listings.length > 0) {
  <app-results
    [listings]="listings"
    [total]="total"
    [page]="page"
    [pageSize]="50"
    (pageChange)="changePage($event)"
  />
}
